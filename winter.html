<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无尽冬日WJTI人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: #1a1a1f;
            color: #fff;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .container {
            display: none;
            background: #25252f;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .container.active {
            display: block;
        }

        .title {
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
            color: #58a6ff;
        }

        .desc {
            text-align: center;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .start-btn {
            display: block;
            width: 200px;
            height: 50px;
            line-height: 50px;
            background: #3178C6;
            color: #fff;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            margin: 0 auto;
            cursor: pointer;
        }
        .start-btn:hover {
            background: #4b98f2;
        }

        .question {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: #333340;
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .option:hover {
            background: #444455;
        }

        .progress {
            text-align: center;
            margin: 20px 0;
            color: #aaa;
        }

        .result-box {
            text-align: center;
            padding: 20px;
        }

        .result-card {
            background: #2b2b38;
            padding: 40px 30px;
            border-radius: 16px;
            margin: 20px 0;
            position: relative;
        }

        .result-card.ssr {
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px #ffd70066;
            background: linear-gradient(135deg, #3a3a4a, #2b2b38);
        }

        .result-tag {
            display: inline-block;
            background: #3178C6;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .result-card.ssr .result-tag {
            background: #ffcc00;
            color: #000;
            font-weight: bold;
        }

        .result-name {
            font-size: 26px;
            color: #58a6ff;
            margin-bottom: 20px;
        }

        .result-desc {
            line-height: 1.8;
            font-size: 15px;
            color: #eee;
            text-align: left;
        }

        .restart-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: #3178C6;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
        }
        .restart-btn:hover {
            background: #4b98f2;
        }
    </style>
</head>

        { key: "skill", name: "无尽冬日六边形战士", desc: "稀有的WJTI人格，全维度拉满，六边形无短板，拥有超强的游戏理解、游戏操作、策略思维和指挥能力，兵工厂、燃霜、国战、霜龙你战无不胜，令敌人闻风丧胆，你是那种让策划怀疑人生的玩家。别人还在问“这个英雄怎么用”，你已经把TA的隐藏机制、最优搭配、伤害期望值全算明白了发在群里了。你说“这个能打”的时候没人质疑，你说“这个废了”的时候氪佬含泪把刚满星的英雄收进仓库。", ssr: true },

        ]},

    let current = 0;
    let score = {};

    function startTest() {
        show("quiz");
        current = 0;
        score = {};
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[current];
        document.getElementById("progress").innerText = `第 ${current+1}/${questions.length} 题`;
        document.getElementById("question").innerText = q.q;
        const opt = document.getElementById("options");
        opt.innerHTML = "";
        q.o.forEach(item => {
            let div = document.createElement("div");
            div.className = "option";
            div.innerText = item.t;
            div.onclick = () => select(item.k);
            opt.appendChild(div);
        });
    }

    function select(k) {
        score[k] = (score[k] || 0) + 1;
        current++;
        if (current >= questions.length) {
            showResult();
        } else {
            renderQuestion();
        }
    }

    function showResult() {
        show("result");
        let maxKey = "";
        let maxVal = 0;
        for (let k in score) {
            if (score[k] > maxVal) {
                maxVal = score[k];
                maxKey = k;
            }
        }
        const res = personalities.find(p => p.key === maxKey);
        const card = document.getElementById("resultCard");
        
        card.classList.remove("ssr");
        if (res.ssr) {
            card.classList.add("ssr");
            document.getElementById("resultTag").innerText = "SSR 稀有人格";
        } else {
            document.getElementById("resultTag").innerText = "普通人格";
        }

        document.getElementById("resultName").innerText = res.name;
        document.getElementById("resultDesc").innerText = res.desc;
    }

    function restart() {
        show("welcome");
    }

    function show(id) {
        document.querySelectorAll(".container").forEach(c => c.classList.remove("active"));
        document.getElementById(id).classList.add("active");
    }
</script>
</body>
</html>
